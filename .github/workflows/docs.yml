name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'brand/horizon-brand-guidelines/**'
      - 'brand/infographics/**'
      - 'brand/social/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build VitePress docs
        working-directory: site
        run: npm run build

      - name: Assemble site
        run: |
          mkdir -p _site
          # VitePress output is the entire site (served at horizon.atlascrew.dev)
          cp -r site/.vitepress/dist/. _site/
          # OG image for social previews (location may change with brand reorg)
          if [ -f brand/social/edge-protection-social.png ]; then
            cp brand/social/edge-protection-social.png _site/og-image.png
          elif [ -f brand/banners/edge-protection-social.png ]; then
            cp brand/banners/edge-protection-social.png _site/og-image.png
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
