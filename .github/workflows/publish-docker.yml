name: Publish Docker images

on:
  push:
    tags:
      - 'signal-horizon-v*'
      - 'synapse-waf-v*'
  workflow_dispatch:
    inputs:
      image:
        description: 'Image to build and push'
        type: choice
        options:
          - horizon
          - synapse-waf
          - all
        default: all
      dry_run:
        description: 'Dry run (build without pushing)'
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Horizon (Signal Horizon)
  # ---------------------------------------------------------------------------
  horizon:
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.ref, 'refs/tags/signal-horizon-v') ||
      (github.event_name == 'workflow_dispatch' && (inputs.image == 'horizon' || inputs.image == 'all'))
    environment: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '' || 'docker-hub' }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/signal-horizon-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/signal-horizon-v}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=latest" >> "$GITHUB_OUTPUT"
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/signal-horizon/Dockerfile
          push: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
          tags: |
            nickcrew/horizon:latest
            ${{ steps.version.outputs.is_tag == 'true' && format('nickcrew/horizon:{0}', steps.version.outputs.version) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        run: |
          docker pull nickcrew/horizon:latest
          docker run --rm nickcrew/horizon:latest node -e "console.log('Horizon image OK')"

  # ---------------------------------------------------------------------------
  # Synapse WAF
  # ---------------------------------------------------------------------------
  synapse-waf:
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.ref, 'refs/tags/synapse-waf-v') ||
      (github.event_name == 'workflow_dispatch' && (inputs.image == 'synapse-waf' || inputs.image == 'all'))
    environment: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '' || 'docker-hub' }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/synapse-waf-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/synapse-waf-v}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=latest" >> "$GITHUB_OUTPUT"
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/synapse-pingora/Dockerfile
          push: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
          tags: |
            nickcrew/synapse-waf:latest
            ${{ steps.version.outputs.is_tag == 'true' && format('nickcrew/synapse-waf:{0}', steps.version.outputs.version) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        run: |
          docker pull nickcrew/synapse-waf:latest
          docker run --rm nickcrew/synapse-waf:latest synapse-waf --version || true
