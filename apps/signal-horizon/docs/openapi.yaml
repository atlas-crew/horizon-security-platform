openapi: 3.0.3
info:
  title: Signal Horizon API
  version: 0.1.0
  description: |
    REST API for the Signal Horizon Hub. Authentication uses API keys via the
    Authorization header: `Bearer <api-key>`.

    WebSocket protocols (sensor and dashboard gateways) are documented in
    `docs/api.md` and are not represented in this OpenAPI spec.
servers:
  - url: http://{host}:{port}
    variables:
      host:
        default: localhost
      port:
        default: "3100"

tags:
  - name: Health
  - name: Status
  - name: Campaigns
  - name: Threats
  - name: Blocklist
  - name: War Rooms
  - name: Intel
  - name: Hunt
  - name: Fleet

security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /ready:
    get:
      tags: [Health]
      summary: Readiness check (DB + ClickHouse)
      security: []
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "503":
          description: Service not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"

  /api/v1/status:
    get:
      tags: [Status]
      summary: Hub status
      security: []
      responses:
        "200":
          description: Hub status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HubStatusResponse"

  /api/v1/campaigns:
    get:
      tags: [Campaigns]
      summary: List campaigns
      description: Tenant-scoped unless fleet admin.
      parameters:
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/CampaignStatus"
        - in: query
          name: severity
          schema:
            $ref: "#/components/schemas/Severity"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Campaign list
          content:
            application/json:
              schema:
                type: object
                properties:
                  campaigns:
                    type: array
                    items:
                      $ref: "#/components/schemas/Campaign"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/campaigns/{id}:
    get:
      tags: [Campaigns]
      summary: Get campaign by ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Campaigns]
      summary: Update campaign status
      description: Cross-tenant campaigns require fleet admin.
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: "#/components/schemas/CampaignStatus"
      responses:
        "200":
          description: Updated campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/threats:
    get:
      tags: [Threats]
      summary: List threats
      description: Tenant-scoped unless fleet admin.
      parameters:
        - in: query
          name: threatType
          schema:
            $ref: "#/components/schemas/ThreatType"
        - in: query
          name: isFleetThreat
          schema:
            type: boolean
        - in: query
          name: minRiskScore
          schema:
            type: number
            minimum: 0
            maximum: 100
        - in: query
          name: maxRiskScore
          schema:
            type: number
            minimum: 0
            maximum: 100
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Threat list
          content:
            application/json:
              schema:
                type: object
                properties:
                  threats:
                    type: array
                    items:
                      $ref: "#/components/schemas/Threat"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/threats/search:
    get:
      tags: [Threats]
      summary: Search threats by indicator substring
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
            minLength: 2
        - in: query
          name: type
          schema:
            $ref: "#/components/schemas/ThreatType"
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  threats:
                    type: array
                    items:
                      $ref: "#/components/schemas/ThreatSearchResult"
                  query:
                    type: string
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/threats/{id}:
    get:
      tags: [Threats]
      summary: Get threat by ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Threat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Threat"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/blocklist:
    get:
      tags: [Blocklist]
      summary: List blocklist entries
      parameters:
        - in: query
          name: blockType
          schema:
            $ref: "#/components/schemas/BlockType"
        - in: query
          name: source
          schema:
            $ref: "#/components/schemas/BlockSource"
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Blocklist entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: "#/components/schemas/BlocklistEntry"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Blocklist]
      summary: Add or update blocklist entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBlocklistRequest"
      responses:
        "201":
          description: Blocklist entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlocklistEntry"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/blocklist/{id}:
    delete:
      tags: [Blocklist]
      summary: Delete blocklist entry
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/blocklist/check:
    get:
      tags: [Blocklist]
      summary: Check if indicator is blocked
      parameters:
        - in: query
          name: indicator
          required: true
          schema:
            type: string
        - in: query
          name: blockType
          schema:
            $ref: "#/components/schemas/BlockType"
      responses:
        "200":
          description: Blocklist check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  blocked:
                    type: boolean
                  entry:
                    $ref: "#/components/schemas/BlocklistEntry"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/warrooms:
    get:
      tags: [War Rooms]
      summary: List war rooms
      parameters:
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/WarRoomStatus"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: War rooms
          content:
            application/json:
              schema:
                type: object
                properties:
                  warRooms:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/WarRoom"
                        - type: object
                          properties:
                            _count:
                              type: object
                              properties:
                                activities:
                                  type: integer
                                campaignLinks:
                                  type: integer
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [War Rooms]
      summary: Create war room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWarRoomRequest"
      responses:
        "201":
          description: War room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarRoom"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/warrooms/{id}:
    get:
      tags: [War Rooms]
      summary: Get war room details
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: War room
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/WarRoom"
                  - type: object
                    properties:
                      activities:
                        type: array
                        items:
                          $ref: "#/components/schemas/WarRoomActivity"
                      _count:
                        type: object
                        properties:
                          activities:
                            type: integer
                          campaignLinks:
                            type: integer
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [War Rooms]
      summary: Update war room status or priority
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWarRoomRequest"
      responses:
        "200":
          description: Updated war room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarRoom"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/warrooms/{id}/activities:
    get:
      tags: [War Rooms]
      summary: List war room activities
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - in: query
          name: cursor
          schema:
            type: string
      responses:
        "200":
          description: Activities
          content:
            application/json:
              schema:
                type: object
                properties:
                  activities:
                    type: array
                    items:
                      $ref: "#/components/schemas/WarRoomActivity"
                  nextCursor:
                    type: string
                    nullable: true
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/warrooms/{id}/messages:
    post:
      tags: [War Rooms]
      summary: Add war room message
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  maxLength: 5000
      responses:
        "201":
          description: Activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarRoomActivity"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/warrooms/{id}/blocks:
    post:
      tags: [War Rooms]
      summary: Create block from war room
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WrBlockCreateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [War Rooms]
      summary: Remove block from war room
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WrBlockRemoveRequest"
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/warrooms/{id}/campaigns:
    post:
      tags: [War Rooms]
      summary: Link campaigns to war room
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                campaignIds:
                  type: array
                  minItems: 1
                  items:
                    type: string
      responses:
        "201":
          description: Linked
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    get:
      tags: [War Rooms]
      summary: List linked campaigns
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Campaigns
          content:
            application/json:
              schema:
                type: object
                properties:
                  campaigns:
                    type: array
                    items:
                      $ref: "#/components/schemas/Campaign"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/warrooms/stats:
    get:
      tags: [War Rooms]
      summary: War room stats
      responses:
        "200":
          description: War room stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarRoomStats"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/intel/iocs:
    get:
      tags: [Intel]
      summary: Export IOCs
      parameters:
        - in: query
          name: format
          schema:
            type: string
            enum: [json, csv, stix]
            default: json
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
        - in: query
          name: threatTypes
          schema:
            type: string
          description: Comma-separated list of threat types
        - in: query
          name: minRiskScore
          schema:
            type: number
            minimum: 0
            maximum: 100
        - in: query
          name: fleetOnly
          schema:
            type: boolean
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 10000
            default: 1000
      responses:
        "200":
          description: IOC export
          content:
            application/json:
              schema:
                type: string
            text/csv:
              schema:
                type: string
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/intel/trends:
    get:
      tags: [Intel]
      summary: Attack volume trends
      parameters:
        - in: query
          name: windowHours
          schema:
            type: integer
            minimum: 1
            maximum: 720
            default: 24
      responses:
        "200":
          description: Trends
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttackTrends"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/intel/fleet-summary:
    get:
      tags: [Intel]
      summary: Fleet-wide intel summary
      responses:
        "200":
          description: Fleet summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetIntelSummary"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/intel/blocklist:
    get:
      tags: [Intel]
      summary: Export blocklist entries
      parameters:
        - in: query
          name: format
          schema:
            type: string
            enum: [json, csv, plain]
            default: json
        - in: query
          name: fleetOnly
          schema:
            type: boolean
      responses:
        "200":
          description: Blocklist export
          content:
            application/json:
              schema:
                type: string
            text/csv:
              schema:
                type: string
            text/plain:
              schema:
                type: string
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/intel/top-threats:
    get:
      tags: [Intel]
      summary: Top threats
      parameters:
        - in: query
          name: windowHours
          schema:
            type: integer
            minimum: 1
            maximum: 720
            default: 24
      responses:
        "200":
          description: Top threats
          content:
            application/json:
              schema:
                type: object
                properties:
                  timeRange:
                    $ref: "#/components/schemas/TimeRange"
                  topIPs:
                    type: array
                    items:
                      $ref: "#/components/schemas/TopIP"
                  topFingerprints:
                    type: array
                    items:
                      $ref: "#/components/schemas/TopFingerprint"
                  topCampaigns:
                    type: array
                    items:
                      $ref: "#/components/schemas/TopCampaign"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/intel/signals-by-type:
    get:
      tags: [Intel]
      summary: Signals by type and severity
      parameters:
        - in: query
          name: windowHours
          schema:
            type: integer
            minimum: 1
            maximum: 720
            default: 24
      responses:
        "200":
          description: Signals by type
          content:
            application/json:
              schema:
                type: object
                properties:
                  timeRange:
                    $ref: "#/components/schemas/TimeRange"
                  signalsByType:
                    type: object
                    additionalProperties:
                      type: integer
                  signalsBySeverity:
                    type: object
                    additionalProperties:
                      type: integer
                  total:
                    type: integer
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/intel/volume-chart:
    get:
      tags: [Intel]
      summary: Time-series volume chart
      parameters:
        - in: query
          name: windowHours
          schema:
            type: integer
            minimum: 1
            maximum: 720
            default: 24
      responses:
        "200":
          description: Volume chart
          content:
            application/json:
              schema:
                type: object
                properties:
                  timeRange:
                    $ref: "#/components/schemas/TimeRange"
                  dataPoints:
                    type: array
                    items:
                      $ref: "#/components/schemas/TrendDataPoint"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/hunt/status:
    get:
      tags: [Hunt]
      summary: Hunt service status
      responses:
        "200":
          description: Hunt status
          content:
            application/json:
              schema:
                type: object
                properties:
                  historical:
                    type: boolean
                  routingThreshold:
                    type: string
                  description:
                    type: string
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/hunt/query:
    post:
      tags: [Hunt]
      summary: Query signal timeline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HuntQuery"
      responses:
        "200":
          description: Query results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HuntQueryResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/hunt/timeline/{campaignId}:
    get:
      tags: [Hunt]
      summary: Campaign timeline (ClickHouse)
      parameters:
        - in: path
          name: campaignId
          required: true
          schema:
            type: string
        - in: query
          name: startTime
          schema:
            type: string
            format: date-time
        - in: query
          name: endTime
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Campaign timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignTimelineResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }

  /api/v1/hunt/stats/hourly:
    get:
      tags: [Hunt]
      summary: Hourly stats (ClickHouse)
      parameters:
        - in: query
          name: tenantId
          schema:
            type: string
        - in: query
          name: startTime
          schema:
            type: string
            format: date-time
        - in: query
          name: endTime
          schema:
            type: string
            format: date-time
        - in: query
          name: signalTypes
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        "200":
          description: Hourly stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HourlyStatsResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
