components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key

  parameters:
    IdParam:
      in: path
      name: id
      required: true
      schema:
        type: string
    LimitParam:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    OffsetParam:
      in: query
      name: offset
      schema:
        type: integer
        minimum: 0
        default: 0

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: Service unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

    ValidationErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              message:
                type: string

    Pagination:
      type: object
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    TimeRange:
      type: object
      properties:
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time

    Severity:
      type: string
      enum: [LOW, MEDIUM, HIGH, CRITICAL]

    SignalType:
      type: string
      enum:
        - IP_THREAT
        - FINGERPRINT_THREAT
        - CAMPAIGN_INDICATOR
        - CREDENTIAL_STUFFING
        - RATE_ANOMALY
        - BOT_SIGNATURE
        - IMPOSSIBLE_TRAVEL

    CampaignStatus:
      type: string
      enum: [ACTIVE, MONITORING, RESOLVED, FALSE_POSITIVE]

    ThreatType:
      type: string
      enum: [IP, FINGERPRINT, ASN, USER_AGENT, TLS_FINGERPRINT, CREDENTIAL_PATTERN]

    BlockType:
      type: string
      enum: [IP, IP_RANGE, FINGERPRINT, ASN, USER_AGENT]

    BlockSource:
      type: string
      enum: [AUTOMATIC, MANUAL, FLEET_INTEL, EXTERNAL_FEED, WAR_ROOM]

    PropagationStatus:
      type: string
      enum: [PENDING, IN_PROGRESS, COMPLETED, FAILED, PARTIAL]

    WarRoomStatus:
      type: string
      enum: [ACTIVE, PAUSED, CLOSED, ARCHIVED]

    Priority:
      type: string
      enum: [LOW, MEDIUM, HIGH, CRITICAL]

    ConnectionState:
      type: string
      enum: [CONNECTED, DISCONNECTED, RECONNECTING]

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
        service:
          type: string
        version:
          type: string
        timestamp:
          type: string
          format: date-time

    ReadyResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        database:
          type: string
          enum: [connected, disconnected]
        clickhouse:
          type: string
          enum: [connected, disabled, disconnected]
        timestamp:
          type: string
          format: date-time
        error:
          type: string

    HubStatusResponse:
      type: object
      properties:
        hub:
          type: string
        version:
          type: string
        uptime:
          type: number
        connections:
          type: object
          properties:
            sensors:
              type: integer
            dashboards:
              type: integer

    Campaign:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
          nullable: true
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/CampaignStatus"
        severity:
          $ref: "#/components/schemas/Severity"
        isCrossTenant:
          type: boolean
        tenantsAffected:
          type: integer
        confidence:
          type: number
        correlationSignals:
          type: object
          additionalProperties: true
        firstSeenAt:
          type: string
          format: date-time
        lastActivityAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        resolvedBy:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Threat:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
          nullable: true
        threatType:
          $ref: "#/components/schemas/ThreatType"
        indicator:
          type: string
        anonIndicator:
          type: string
          nullable: true
        riskScore:
          type: number
        fleetRiskScore:
          type: number
          nullable: true
        firstSeenAt:
          type: string
          format: date-time
        lastSeenAt:
          type: string
          format: date-time
        hitCount:
          type: integer
        tenantsAffected:
          type: integer
        isFleetThreat:
          type: boolean
        ttl:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ThreatSearchResult:
      type: object
      properties:
        id:
          type: string
        threatType:
          $ref: "#/components/schemas/ThreatType"
        indicator:
          type: string
        riskScore:
          type: number
        hitCount:
          type: integer
        isFleetThreat:
          type: boolean
        lastSeenAt:
          type: string
          format: date-time

    BlocklistEntry:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
          nullable: true
        threatId:
          type: string
          nullable: true
        blockType:
          $ref: "#/components/schemas/BlockType"
        indicator:
          type: string
        source:
          $ref: "#/components/schemas/BlockSource"
        reason:
          type: string
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        propagatedAt:
          type: string
          format: date-time
          nullable: true
        propagationStatus:
          $ref: "#/components/schemas/PropagationStatus"
        sensorsNotified:
          type: integer
        createdAt:
          type: string
          format: date-time

    WarRoom:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/WarRoomStatus"
        priority:
          $ref: "#/components/schemas/Priority"
        leaderId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        closedAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time

    WarRoomActivity:
      type: object
      properties:
        id:
          type: string
        warRoomId:
          type: string
        tenantId:
          type: string
        actorType:
          type: string
          enum: [USER, HORIZON_BOT, SYSTEM]
        actorId:
          type: string
          nullable: true
        actorName:
          type: string
        actionType:
          type: string
          enum:
            - MESSAGE
            - BLOCK_CREATED
            - BLOCK_REMOVED
            - CAMPAIGN_LINKED
            - STATUS_CHANGED
            - PRIORITY_CHANGED
            - MEMBER_JOINED
            - MEMBER_LEFT
            - ALERT_TRIGGERED
        description:
          type: string
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time

    WarRoomStats:
      type: object
      properties:
        activeWarRooms:
          type: integer
        activitiesLast24h:
          type: integer
        blocksCreatedLast24h:
          type: integer

    FleetMetrics:
      type: object
      properties:
        totalSensors:
          type: integer
        onlineSensors:
          type: integer
        offlineSensors:
          type: integer
        totalRps:
          type: number
        avgLatency:
          type: number
        healthScore:
          type: number
        avgCpu:
          type: number
        avgMemory:
          type: number
        avgDisk:
          type: number
        timestamp:
          type: string
          format: date-time

    Sensor:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        hostname:
          type: string
          nullable: true
        region:
          type: string
        version:
          type: string
        connectionState:
          $ref: "#/components/schemas/ConnectionState"
        lastHeartbeat:
          type: string
          format: date-time
          nullable: true
        lastSignalAt:
          type: string
          format: date-time
          nullable: true
        signalsReported:
          type: integer
        blocksApplied:
          type: integer
        ipAddress:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SensorAlertEntry:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        connectionState:
          $ref: "#/components/schemas/ConnectionState"
        lastHeartbeat:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
          additionalProperties: true

    FleetCommand:
      type: object
      properties:
        id:
          type: string
        sensorId:
          type: string
        commandType:
          type: string
        payload:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [pending, sent, success, failed, timeout]
        result:
          type: object
          additionalProperties: true
          nullable: true
        error:
          type: string
          nullable: true
        queuedAt:
