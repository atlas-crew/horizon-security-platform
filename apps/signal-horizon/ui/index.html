<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signal Horizon — Fleet Intelligence Dashboard</title>
    <meta name="description" content="Edge protection and fleet intelligence platform. Real-time threat detection, campaign correlation, and WAF management across distributed Synapse sensors." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Signal Horizon — Fleet Intelligence Dashboard" />
    <meta property="og:description" content="Edge protection and fleet intelligence platform. Real-time threat detection, campaign correlation, and WAF management." />
    <meta property="og:image" content="https://horizon-demo.atlascrew.dev/og-image.png" />
    <meta property="og:url" content="https://horizon-demo.atlascrew.dev" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Signal Horizon — Fleet Intelligence Dashboard" />
    <meta name="twitter:description" content="Edge protection and fleet intelligence platform. Real-time threat detection, campaign correlation, and WAF management." />
    <meta name="twitter:image" content="https://horizon-demo.atlascrew.dev/og-image.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Recursive:slnt,wght,CASL,CRSV,MONO@-15..0,300..900,0..1,0..1,0..1&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        const stored = localStorage.getItem('signal-horizon-theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = stored || (prefersDark ? 'dark' : 'light');
        if (theme === 'dark') document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
