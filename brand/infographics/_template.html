.hero-stat{text-align:center;position:relative;flex:1;}
.hero-stat .value{color:var(--blue);position:relative;z-index:1;}
.hero-stat .glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);width:100px;height:60px;border-radius:50%;filter:blur(20px);opacity:0.15;z-index:0;}
.hero-stat .label{color:var(--muted);margin-top:4px;position:relative;z-index:1;}
